<html>
    <head>
        <meta charset="utf-8" />
        <title>Pong</title>
        <style>
            body, div {
                width: 800px;
                margin: 0 auto;
            }
            #gameCanvas {
                border-radius: 20px;
            }
            #debug1, #debug2 {
                position: absolute;
                bottom:10;
                left: 300px;
                width: 50px;
                height: 50px;
                background: none;
                color: #fff;
                font-size: 300%;
                margin:0
            }
            #debug2 {
                left: 470px;
            }
        </style>
    </head>
    <body>
        <div>    
            <canvas id="gameCanvas" width="800" height="600"></canvas>
            <h1 id="debug1">0</h1>
            <h1 id="debug2">0</h1>
        </div>
    </body>
    <script>
        let canvas
        , canvasContext
        , MouseX = 0
        , MouseY = 0
        , ballX = 400
        , ballY = 300
        , trig = true
        , signX = 1
        , signY = 1
        , colour = 'white'
        , testL = true
        , testR = true
        , countL = 0
        , countR = 0
        , collX = false
        , rand = 0
        , setCanvasContext = function( col, px, py, sx, sy ) {
            canvasContext .fillStyle = col
            canvasContext .fillRect( px, py, sx, sy )
        }
        , getMousePos = function( event ) {
        MouseX = event .clientX - 10
        MouseY = event .clientY - 50
        }
        , drawBall = function() {
            setCanvasContext( 'white', 397.5, 0, 1, 600 )
            setCanvasContext( 'black', ballX, ballY, 21, 21 )
            if ( ballX >= 760 ) {
                rand = Math .floor( ( Math. random() * 11 ) )
                signX = -1;
                if ( testR = Math .abs( ballY - MouseY ) - 10 <= 70 ) {}
                else {
                    collX = true
                    countL++
                    setCanvasContext( 'red', 20, 0, canvas .width - 40, canvas .height )
                }
            }
            if ( ballX <= 20 ) {
                rand = Math .floor( ( Math .random() * 11 ) )
                signX = 1
                if ( testL = Math .abs( ballY - MouseY ) - 10 <= 70 ) {}
                else {
                    collX = true
                    countR++
                    setCanvasContext( 'red', 20, 0, canvas .width - 40, canvas .height )
                }
            }
            if ( ( ballX === 740 ) && collX == true ) {
                setCanvasContext( 'black', 20, 0, canvas .width - 40, canvas .height )
                collX = false
            }
            if ( ( ballX === 60 ) && collX == true ) {
                setCanvasContext( 'black', 20, 0, canvas .width - 40, canvas .height)
                collX = false
            }
            ballY < 10 && ( signY = 1 )
            ballY > 590 && ( signY = -1 )
            ballX = ballX + ( signX * 20 )
            ballY = ballY + ( rand*signY )
            setCanvasContext( colour, ballX, ballY, 20, 20 )
            document .getElementById( 'debug1' ) .innerHTML = countL
            document .getElementById( 'debug2' ) .innerHTML = countR
            //window.requestAnimationFrame(drawBall);
        }
        // ------------------------- Everything ------------------------------
        function drawEverything( event ) {
        if ( trig == true ) {
            setCanvasContext( 'black', 0, 0, 20, 600 )
            setCanvasContext( 'black', 780, 0, 20, 600 )
            getMousePos( event )
            setCanvasContext( 'green', 0, MouseY, 20, 100 )
            setCanvasContext( 'red', 780, MouseY, 20, 100 )
        }
        }
        // ------------------------- START GAME ------------------------------
        !function() {
            canvas = document .getElementById( "gameCanvas" )
            canvasContext = canvas .getContext( '2d' )
            setCanvasContext( 'black', 0, 0, canvas .width, canvas .height )
            setCanvasContext( 'green', 0, 250, 20, 100 )
            setCanvasContext( 'red', 780, 250, 20, 100 )
            setCanvasContext( 'white', 397.5, 0, 1, 600 )
            setCanvasContext( 'white', ballX, ballY, 20, 20 )
            rand = Math .floor( ( Math .random() * 11 ) - 5 )
            setInterval( drawBall, 25 )
            canvas .addEventListener( 'mousemove', drawEverything )
            //window.requestAnimationFrame(drawBall);
        }()
    </script>
</html>
